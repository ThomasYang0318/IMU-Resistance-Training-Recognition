data:
  data_dir: ./datasets/raw_data
  csv_glob: "*.csv"

io:
  output_dir: ./artifacts_student

feature:
  imu_columns: [ax, ay, az, gx, gy, gz]
  label_column: action_type
  subject_column: subject_id
  time_column: sensor_ts

window:
  sample_rate_hz: 50
  window_seconds: 1.5
  stride_seconds: 0.5

model:
  input_channels: 6
  num_classes: 8
  patch_size: 10
  embed_dim: 128
  depth: 2
  num_heads: 4
  mlp_ratio: 2
  dropout: 0.1

train:
  seed: 42
  batch_size: 64
  epochs: 30
  lr: 0.0001
  weight_decay: 0.00001
  num_workers: 0
  device: cpu
